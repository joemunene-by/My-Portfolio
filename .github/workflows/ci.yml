name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # lint step returns when the real ESLint setup lands (upgrade-deps branch);
      # `next lint` has no config on main and dies at an interactive prompt in CI
      - run: npm run build
